<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="틈새시간">
<meta name="theme-color" content="#0d0d18">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>틈새시간 기록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d18; --surface: #16162a; --border: #2a2a45;
    --accent: #00e5ff; --accent2: #ff6b35; --green: #00e676;
    --text: #f0f0ff; --muted: #9090b0;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 30px 16px 50px; }
  h1 { font-size: 30px; letter-spacing: 6px; color: var(--muted); text-align: center; margin-bottom: 28px; font-weight: 600; }
  .clock-wrap { text-align: center; margin-bottom: 28px; }
  .clock-ring { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; width: 280px; height: 280px; border-radius: 50%; border: 2px solid var(--border); background: radial-gradient(circle at center, #12122a 60%, #0d0d18 100%); box-shadow: 0 0 50px rgba(0,229,255,0.07); transition: border-color 0.3s, box-shadow 0.3s; }
  .clock-ring.running { border-color: rgba(0,229,255,0.4); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 50px rgba(0,229,255,0.1); } 50% { box-shadow: 0 0 100px rgba(0,229,255,0.25); } }
  .time-display { font-family: 'Share Tech Mono', monospace; font-size: 72px; color: var(--accent); text-shadow: 0 0 24px rgba(0,229,255,0.5); letter-spacing: 4px; line-height: 1; }
  .time-label { font-size: 18px; color: var(--muted); margin-top: 10px; letter-spacing: 6px; font-weight: 600; }
  .btn-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
  .main-btn { width: 120px; height: 120px; border-radius: 50%; border: none; cursor: pointer; background: linear-gradient(145deg, #1e1e38, #12122a); box-shadow: 5px 5px 18px rgba(0,0,0,0.7), 0 0 0 2px var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; transition: all 0.15s; }
  .main-btn:active { transform: scale(0.95); }
  .main-btn.running { box-shadow: 5px 5px 18px rgba(0,0,0,0.7), 0 0 0 2px var(--accent2), 0 0 40px rgba(255,107,53,0.25); }
  .btn-icon { font-size: 32px; pointer-events: none; }
  .btn-label { font-size: 20px; font-weight: 700; letter-spacing: 2px; color: var(--text); pointer-events: none; }
  .status-msg { text-align: center; font-size: 20px; color: var(--muted); margin-bottom: 24px; min-height: 28px; letter-spacing: 1px; font-weight: 500; }
  .status-msg.syncing { color: var(--green); }
  .status-msg.error { color: var(--accent2); }
  .laps-section { width: 100%; max-width: 520px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
  .laps-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 22px; border-bottom: 1px solid var(--border); }
  .laps-title { font-size: 22px; color: var(--muted); letter-spacing: 4px; font-weight: 600; }
  .laps-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
  .total-badge { font-family: 'Share Tech Mono', monospace; font-size: 18px; color: var(--green); background: rgba(0,230,118,0.08); padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(0,230,118,0.2); font-weight: 600; }
  .reset-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 8px 18px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; }
  .reset-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .col-header { display: grid; grid-template-columns: 58px 1fr 1fr 90px; padding: 10px 22px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }
  .col-header span { font-size: 14px; color: var(--muted); letter-spacing: 1px; text-align: center; font-weight: 600; }
  .col-header span:first-child { text-align: left; }
  .col-header span:last-child { text-align: right; }
  .laps-list { max-height: 450px; overflow-y: auto; }
  .laps-list::-webkit-scrollbar { width: 4px; }
  .laps-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .lap-item { display: grid; grid-template-columns: 58px 1fr 1fr 90px; align-items: center; padding: 18px 22px; border-bottom: 1px solid var(--border); animation: slidein 0.3s ease; }
  .lap-item:last-child { border-bottom: none; }
  @keyframes slidein { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .lap-num { font-family: 'Share Tech Mono', monospace; font-size: 32px; color: var(--accent2); font-weight: bold; }
  .lap-split { font-size: 24px; color: var(--text); text-align: center; font-weight: 700; }
  .lap-total { font-size: 22px; color: var(--green); text-align: center; font-weight: 600; }
  .lap-datetime { text-align: right; }
  .lap-date { font-size: 14px; color: var(--muted); display: block; font-weight: 500; }
  .lap-time { font-size: 18px; color: var(--accent); display: block; font-family: 'Share Tech Mono', monospace; }
  .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 20px; line-height: 2.2; font-weight: 500; }
</style>
</head>
<body>

<h1>틈새시간 기록</h1>

<div class="clock-wrap">
  <div class="clock-ring" id="clockRing">
    <div class="time-display" id="timeDisplay">00:00</div>
    <div class="time-label">분 : 초</div>
  </div>
</div>

<div class="btn-wrap">
  <button class="main-btn" id="mainBtn" onclick="handleClick()">
    <span class="btn-icon" id="btnIcon">▶</span>
    <span class="btn-label" id="btnLabel">시작</span>
  </button>
</div>

<div class="status-msg" id="statusMsg">버튼을 눌러 시작하세요</div>

<div style="text-align:center; margin-bottom: 20px;">
  <a href="https://docs.google.com/spreadsheets/d/1p8MFB6aV23lnYDo8p2eahXH7iwAgWwEPHbrxnlF9qF8/edit?gid=272350139#gid=272350139" target="_blank" style="display:inline-block; background:#16162a; border:1px solid #2a2a45; color:#00e676; padding:12px 28px; border-radius:12px; font-size:16px; font-weight:600; text-decoration:none; letter-spacing:2px;">📊 시트 확인</a>
</div>

<div class="laps-section">
  <div class="laps-header">
    <span class="laps-title">기 록</span>
    <div class="laps-right">
      <span class="total-badge" id="totalBadge" style="display:none"></span>
      <button class="reset-btn" onclick="resetAll()">초기화</button>
    </div>
  </div>
  <div class="col-header" id="colHeader" style="display:none">
    <span>번호</span>
    <span>구간시간</span>
    <span>누적합계</span>
    <span>날짜/시간</span>
  </div>
  <div class="laps-list" id="lapsList">
    <div class="empty-state">아직 기록이 없습니다<br>버튼을 눌러 시작하세요 👆</div>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzhpTrrwwa6JQIplH-6ZvbW-rJZycX06_WqxmZtDfHx43eKSp2VZL84Jqm3RpLwIWgs/exec';

  let running = false;
  let startTime = 0;
  let elapsed = 0;
  let raf = null;
  let laps = [];
  let lapCount = 0;
  let totalAccum = 0;
  let lapStartDatetime = null;

  async function fetchLastNum() {
    try {
      const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
      const data = await res.json();
      if (data.lastNum && data.lastNum > lapCount) lapCount = data.lastNum;
    } catch(e) {}
  }
  fetchLastNum();

  function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

  function fmt(ms) {
    const m = Math.floor(ms / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    return `${pad(m)}:${pad(s)}`;
  }

  function fmtKorean(ms) {
    const totalSec = Math.floor(ms / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    let result = '';
    if (h > 0) result += h + '시간 ';
    if (m > 0) result += m + '분 ';
    if (s > 0 || result === '') result += s + '초';
    return result.trim();
  }

  function formatAMPM(h, m) {
    const ampm = h < 12 ? 'AM' : 'PM';
    const h12 = h % 12 === 0 ? 12 : h % 12;
    return ampm + ' ' + h12 + ':' + pad(m);
  }

  function getNow() {
    const now = new Date();
    const date = `${now.getMonth()+1}월${now.getDate()}일`;
    const h = now.getHours();
    const mn = now.getMinutes();
    return {
      date,
      time: pad(h) + ':' + pad(mn),
      timeDisplay: formatAMPM(h, mn)
    };
  }

  function tick() {
    elapsed = Date.now() - startTime;
    document.getElementById('timeDisplay').textContent = fmt(elapsed);
    raf = requestAnimationFrame(tick);
  }

  function resetUI() {
    document.getElementById('timeDisplay').textContent = '00:00';
    document.getElementById('clockRing').classList.remove('running');
    document.getElementById('mainBtn').classList.remove('running');
    document.getElementById('btnIcon').textContent = '▶';
    document.getElementById('btnLabel').textContent = '시작';
  }

  function handleClick() {
    if (!running) {
      running = true;
      startTime = Date.now();
      elapsed = 0;
      lapStartDatetime = getNow();
      document.getElementById('clockRing').classList.add('running');
      document.getElementById('mainBtn').classList.add('running');
      document.getElementById('btnIcon').textContent = '⏹';
      document.getElementById('btnLabel').textContent = '정지';
      setStatus('⏱ 측정 중...', '');
      raf = requestAnimationFrame(tick);
    } else {
      cancelAnimationFrame(raf);
      raf = null;
      running = false;

      const lapTime = (typeof elapsed === 'number' && !isNaN(elapsed) && elapsed > 0) ? elapsed : 0;

      if (lapTime < 1000) {
        setStatus('⚠️ 너무 짧습니다 (1초 이상 측정하세요)', 'error');
        elapsed = 0;
        lapStartDatetime = null;
        resetUI();
        setTimeout(() => setStatus('버튼을 눌러 시작하세요', ''), 3000);
        return;
      }

      if (!lapStartDatetime) lapStartDatetime = getNow();

      lapCount++;
      totalAccum += lapTime;
      const lap = {
        num: lapCount,
        split: lapTime,
        total: totalAccum,
        date: lapStartDatetime.date,
        startTime: lapStartDatetime.time,
        startTimeDisplay: lapStartDatetime.timeDisplay
      };
      laps.unshift(lap);
      renderLaps();
      sendToSheet(lap);

      elapsed = 0;
      lapStartDatetime = null;
      resetUI();
    }
  }

  async function sendToSheet(lap) {
    setStatus('저장 중...', 'syncing');
    try {
      const splitMs = (typeof lap.split === 'number' && !isNaN(lap.split) && lap.split > 0) ? lap.split : 0;
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          num: lap.num,
          date: lap.date,
          startTime: lap.startTime,
          splitMs: splitMs
        })
      });
      setStatus('✅ 저장됐습니다', 'syncing');
    } catch(e) {
      setStatus('⚠️ 저장 실패 (인터넷 확인)', 'error');
    }
    setTimeout(() => setStatus('버튼을 눌러 시작하세요', ''), 3000);
  }

  function setStatus(msg, cls) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg ' + (cls || '');
  }

  function renderLaps() {
    const list = document.getElementById('lapsList');
    const colH = document.getElementById('colHeader');
    const badge = document.getElementById('totalBadge');
    if (laps.length === 0) {
      colH.style.display = 'none';
      badge.style.display = 'none';
      list.innerHTML = '<div class="empty-state">아직 기록이 없습니다<br>버튼을 눌러 시작하세요 👆</div>';
      return;
    }
    colH.style.display = 'grid';
    badge.style.display = 'inline';
    badge.textContent = '합계 ' + fmtKorean(totalAccum);
    list.innerHTML = laps.map(lap => `
      <div class="lap-item">
        <div class="lap-num">${String(lap.num).padStart(2,'0')}</div>
        <div class="lap-split">${fmtKorean(lap.split)}</div>
        <div class="lap-total">${fmtKorean(lap.total)}</div>
        <div class="lap-datetime">
          <span class="lap-date">${lap.date}</span>
          <span class="lap-time">${lap.startTimeDisplay}</span>
        </div>
      </div>
    `).join('');
  }

  function resetAll() {
    if (raf) cancelAnimationFrame(raf);
    running = false; elapsed = 0; totalAccum = 0; laps = [];
    lapStartDatetime = null;
    resetUI();
    setStatus('버튼을 눌러 시작하세요', '');
    renderLaps();
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  }
</script>
</body>
</html>
